<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Get Started on Facebook</h1>

    <!-- block element -->
    <div>
      Lorem ipsum, dolor sit amet consectetur adipisicing elit. Dolores, natus!
    </div>
    <div>
      Lorem ipsum dolor, sit amet consectetur adipisicing elit. Animi nihil
      natus officia est aut illum incidunt molestias cum qui ipsam.
    </div>

    <!-- inline element -->
    <span> Hello </span>
    <span>World</span>

    <br />
    <br />
    <br />
    <div>
      <form action="https://google.com">
        <label for="firstname">
          First name
          <input type="text" />
        </label>
        <br />

        <label for="lastname">
          Last name
          <input type="text" />
        </label>
        <br />

        <label for="">Day</label>
        <select name="day">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>

        <br />
        <label for="">Month</label>
        <select name="month">
          <option value="jan">jan</option>
          <option value="feb">feb</option>
          <option value="mar">mar</option>
        </select>

        <br />
        <label for="">Year</label>
        <select name="year">
          <option value="2024">2024</option>
          <option value="2025">2025</option>
          <option value="2026">2026</option>
        </select>

        <br />

        <label for="email">
          Email
          <input type="email" name="email" required />
        </label>

        <label for="password">
          Password
          <input type="password" />
        </label>

        <div>
          <textarea name="profile" id="" cols="40" rows="5"></textarea>
        </div>

        <div>
          <input type="date" />

          <input type="datetime-local" />

          <input type="color" />
        </div>

        <label for="">
          Click Me
          <input type="checkbox" name="name" id="" />
        </label>

        <p>Please select you favorite Web language</p>
        <input type="radio" id="html" name="fav_lang" value="HTML" />
        <label for="html">HTML</label>
        <input type="radio" id="css" name="fav_lang" value="CSS" />
        <label for="css">CSS</label>
        <input
          type="radio"
          id="javascript"
          name="fav_lang"
          value="JavaScript"
        />
        <label for="css">JavaScript</label>
        <br />

        <input type="range" min="0" max="100" />

        <input type="submit" />

        <button type="submit">Click for Login</button>
      </form>
    </div>
  </body>
</html>
